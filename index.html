<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素单词乐园 · 场景探索</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5e6d3;
            --pixel-border: #3d2b1f;
            --card-bg: #fffef9;
            --shadow: #2c1a0e;
            --accent-pink: #e8536c;
            --accent-green: #4aab73;
            --accent-blue: #4d8ecb;
            --accent-yellow: #f0b440;
            --accent-orange: #e8833a;
            --font-pixel: 'Press Start 2P', 'Courier New', monospace;
            --font-main: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle, #e8d5c0 2px, transparent 2px),
                radial-gradient(circle, #e8d5c0 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 100%;
            background: #fffef9;
            border: 6px solid var(--pixel-border);
            box-shadow: 8px 8px 0 0 var(--shadow), 12px 12px 0 0 rgba(44, 26, 14, 0.3);
            padding: 16px;
            margin: 10px 0 30px;
        }

        /* 标题 */
        .header {
            text-align: center;
            margin-bottom: 12px;
        }
        .header .title-pixel {
            font-family: var(--font-pixel);
            font-size: clamp(14px, 3vw, 18px);
            color: #3d2b1f;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #f0b440, 5px 5px 0 rgba(61, 43, 31, 0.2);
        }

        /* 场景导航 */
        .scene-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .scene-tab {
            font-family: var(--font-pixel);
            font-size: 9px;
            padding: 8px 12px;
            border: 3px solid var(--pixel-border);
            background: #fff;
            cursor: pointer;
            border-radius: 0;
            letter-spacing: 0.5px;
            box-shadow: 3px 3px 0 0 #c4a88c;
            transition: 0.1s;
            color: #3d2b1f;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .scene-tab:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 0 #c4a88c;
        }
        .scene-tab.active {
            background: #4aab73;
            color: #fff;
            border-color: #2c5a3e;
            box-shadow: 3px 3px 0 0 #2c5a3e;
        }

        /* 画布容器 */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            border: 4px solid #3d2b1f;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #f0e0c8;
            /* 像素阴影效果 */
            box-shadow: 6px 6px 0 0 #8b6f5e;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
        }

        /* 单词气泡 */
        .word-bubble {
            position: absolute;
            background: #fffbe6;
            border: 3px solid #3d2b1f;
            padding: 8px 12px;
            font-family: var(--font-pixel);
            font-size: 11px;
            color: #3d2b1f;
            pointer-events: none;
            box-shadow: 3px 3px 0 0 rgba(0, 0, 0, 0.2);
            z-index: 50;
            white-space: nowrap;
            transition: opacity 0.2s;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .bubble-speaker {
            font-size: 16px;
            cursor: pointer;
            pointer-events: auto;
        }

        /* 星星栏 */
        .star-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            padding: 8px;
            background: #fffbe6;
            border: 3px solid #ddd0b8;
            font-family: var(--font-pixel);
            font-size: 10px;
            color: #3d2b1f;
        }
        .star-icons {
            font-size: 22px;
            letter-spacing: 2px;
        }
        .star-filled {
            color: #ffc107;
            text-shadow: 1px 1px 0 #b8860b;
        }
        .star-empty {
            color: #ddd;
            text-shadow: 1px 1px 0 #bbb;
        }
        .reset-btn {
            font-family: var(--font-pixel);
            font-size: 9px;
            padding: 6px 10px;
            border: 2px solid #5c4a3a;
            background: #fce4c8;
            cursor: pointer;
            border-radius: 0;
            box-shadow: 2px 2px 0 0 #b8a088;
            color: #3d2b1f;
            letter-spacing: 0.5px;
            transition: 0.1s;
        }
        .reset-btn:hover {
            background: #ffe8d0;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 0 #b8a088;
        }
        .reset-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 0px 0px 0 0 #b8a088;
        }

        .footer-note {
            font-family: var(--font-pixel);
            font-size: 7px;
            color: #b8a088;
            text-align: center;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .main-container {
                padding: 8px;
                border-width: 4px;
                box-shadow: 5px 5px 0 0 var(--shadow), 8px 8px 0 0 rgba(44, 26, 14, 0.25);
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 标题 -->
        <div class="header">
            <span class="title-pixel">⭐ 像素单词乐园 ⭐</span>
            <div style="font-family: var(--font-pixel); font-size: 8px; color: #8b6f5e;">点一点场景里的物品学单词</div>
        </div>

        <!-- 场景导航 -->
        <div class="scene-nav" id="sceneNav">
            <button class="scene-tab active" data-scene="supermarket">🛒 超市</button>
            <button class="scene-tab" data-scene="hospital">🏥 医院</button>

        <!-- 画布区域 -->
        <div class="canvas-wrapper" id="canvasWrapper">

        <!-- 星星栏 -->
        <div class="star-bar">
            <span>🌟 收集星星:</span>
            <span class="star-icons" id="starIcons">
                <span class="star-empty">☆</span><span class="star-empty">☆</span><span class="star-empty">☆</span>
                <span class="star-empty">☆</span><span class="star-empty">☆</span><span class="star-empty">☆</span>
                <span class="star-empty">☆</span><span class="star-empty">☆</span>
            </span>
            <span id="starCountText">0 / 8</span>
            <button class="reset-btn" id="btnReset">🔄 重置星星</button>

    </div>

    <div class="footer-note">
        🎨 点击场景中的物品，弹出单词并听发音 | 部署在 GitHub Pages 上即可分享

    <script>

                },
                home: {
                    name: '家',
                    bgColor: '#fdf5e6',
                    groundColor: '#d0b896',
                    words: [
                        { en: 'BED', zh: '床', iconType: 'bed_home', color: '#d5b8e8', x: 100, y: 250 },
                        { en: 'TABLE', zh: '桌子', iconType: 'table', color: '#c89b6e', x: 300, y: 280 },
                        { en: 'CHAIR', zh: '椅子', iconType: 'chair', color: '#a08060', x: 240, y: 300 },
                        { en: 'LAMP', zh: '台灯', iconType: 'lamp', color: '#f0d040', x: 480, y: 170 },
                        { en: 'CLOCK', zh: '时钟', iconType: 'clock', color: '#fefefe', x: 400, y: 100 },
                        { en: 'DOOR', zh: '门', iconType: 'door', color: '#8b5e3c', x: 520, y: 200 },
                        { en: 'SOFA', zh: '沙发', iconType: 'sofa', color: '#e8a060', x: 60, y: 280 },
                        { en: 'PHONE', zh: '电话', iconType: 'phone', color: '#5dade2', x: 200, y: 160 },
                    ]
                }
            };

            // 当前状态
            let currentSceneId = 'supermarket';
            let collectedItems = {}; // 记录每个场景中已收集的物品英文名 { sceneId: [wordEn, ...] }
            const maxItemsPerScene = 8;

            // DOM 元素
            const canvas = document.getElementById('sceneCanvas');
            const ctx = canvas.getContext('2d');
            const canvasWrapper = document.getElementById('canvasWrapper');
            const wordBubble = document.getElementById('wordBubble');
            const bubbleWord = document.getElementById('bubbleWord');
            const bubbleSpeaker = document.getElementById('bubbleSpeaker');
            const starIcons = document.getElementById('starIcons');
            const starCountText = document.getElementById('starCountText');
            const sceneNav = document.getElementById('sceneNav');

            // 当前显示的气泡信息
            let currentBubbleItem = null;
            let bubbleTimeout = null;

            // ==================== 像素绘图函数 ====================
            function drawPixelIcon(ctx, iconType, mainColor, x, y, size = 32) {
                const s = size;
                const c = mainColor;

                function fillRect(rx, ry, rw, rh, color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(x + rx, y + ry, rw, rh);
                }

                function drawCirclePixels(cx, cy, r, color) {
                    ctx.fillStyle = color;
                    for (let py = Math.max(0, cy - r); py <= Math.min(s - 1, cy + r); py++) {
                        for (let px = Math.max(0, cx - r); px <= Math.min(s - 1, cx + r); px++) {
                            const dx = px - cx;
                            const dy = py - cy;
                            if (dx * dx + dy * dy <= r * r + 1) {
                                ctx.fillRect(x + px, y + py, 1, 1);
                            }
                        }
                    }
                }

                ctx.save();
                // 使用像素化渲染
                ctx.imageSmoothingEnabled = false;

                switch (iconType) {
                    case 'apple':
                        drawCirclePixels(16, 18, 10, '#d63031');
                        drawCirclePixels(13, 14, 5, '#e74c3c');
                        drawCirclePixels(19, 14, 5, '#e74c3c');
                        fillRect(15, 5, 3, 6, '#6b4226');
                        fillRect(11, 8, 4, 4, '#5a9e4b');
                        fillRect(18, 20, 4, 2, '#fffef9');
                        break;
                    case 'bread':
                        fillRect(4, 10, 24, 16, '#e8a840');
                        fillRect(3, 9, 26, 4, '#d49430');
                        fillRect(5, 8, 22, 3, '#c48428');
                        fillRect(7, 6, 18, 3, '#b87820');
                        fillRect(10, 18, 4, 4, '#f5d090');
                        break;
                    case 'milk':
                        fillRect(8, 6, 16, 22, '#fefefe');
                        fillRect(7, 4, 18, 5, '#4d8ecb');
                        fillRect(10, 2, 12, 4, '#e8e8e8');
                        fillRect(11, 10, 6, 8, '#e8f0f8');
                        fillRect(12, 12, 4, 4, '#4d8ecb');
                        break;
                    case 'egg':
                        drawCirclePixels(16, 17, 9, '#fef9f0');
                        drawCirclePixels(14, 15, 5, '#fffef9');
                        fillRect(13, 20, 6, 3, '#f0e0c8');
                        fillRect(15, 13, 3, 2, '#fffef9');
                        break;
                    case 'cheese':
                        fillRect(4, 8, 24, 18, '#f9d54c');
                        fillRect(5, 7, 22, 3, '#e8c030');
                        fillRect(10, 13, 5, 5, '#e8b820');
                        fillRect(20, 16, 4, 4, '#e8b820');
                        fillRect(7, 19, 3, 3, '#e8b820');
                        fillRect(22, 10, 3, 3, '#e8b820');
                        break;
                    case 'juice':
                        fillRect(8, 8, 16, 20, '#f8973c');
                        fillRect(6, 5, 20, 6, '#e8833a');
                        fillRect(12, 2, 8, 5, '#e8e8e8');
                        fillRect(10, 12, 8, 8, '#ffe0b0');
                        fillRect(12, 14, 4, 4, '#f8973c');
                        break;
                    case 'candy':
                        fillRect(4, 12, 24, 10, '#e8538c');
                        fillRect(3, 14, 26, 6, '#f070a0');
                        fillRect(6, 10, 20, 4, '#fefefe');
                        fillRect(7, 20, 18, 4, '#fefefe');
                        fillRect(2, 13, 4, 8, '#fefefe');
                        fillRect(26, 13, 4, 8, '#fefefe');
                        break;
                    case 'fish':
                        drawCirclePixels(12, 16, 9, '#6db3d8');
                        fillRect(18, 10, 10, 12, '#5dade2');
                        fillRect(24, 12, 6, 8, '#4d9ec0');
                        fillRect(26, 14, 4, 4, '#3d8eae');
                        fillRect(5, 14, 4, 3, '#4d9ec0');
                        fillRect(2, 13, 4, 5, '#3d8eae');
                        fillRect(8, 16, 3, 3, '#fff');
                        break;
                    case 'doctor':
                        fillRect(10, 2, 12, 10, '#f5d5b8');
                        fillRect(8, 10, 16, 16, '#5dade2');
                        fillRect(6, 8, 4, 20, '#4d8ecb');
                        fillRect(22, 8, 4, 20, '#4d8ecb');
                        fillRect(14, 5, 4, 4, '#6b4226');
                        fillRect(10, 14, 4, 4, '#fefefe');
                        fillRect(18, 14, 4, 4, '#fefefe');
                        break;
                    case 'nurse':
                        fillRect(10, 2, 12, 10, '#f5d5b8');
                        fillRect(8, 10, 16, 16, '#f5b7b1');
                        fillRect(6, 6, 20, 4, '#fefefe');
                        fillRect(12, 3, 8, 5, '#fefefe');
                        fillRect(14, 15, 4, 4, '#fefefe');
                        fillRect(10, 1, 3, 4, '#e8536c');
                        fillRect(19, 3, 3, 4, '#e8536c');
                        break;
                    case 'pill':
                        fillRect(6, 10, 10, 14, '#e74c3c');
                        fillRect(16, 10, 10, 14, '#fefefe');
                        fillRect(5, 9, 22, 4, '#d63031');
                        fillRect(5, 20, 22, 4, '#d63031');
                        fillRect(14, 12, 4, 10, '#e8e8e8');
                        break;
                    case 'bandage':

                        fillRect(8, 7, 16, 18, '#fdf5e6');
                        fillRect(10, 6, 12, 20, '#fef9f0');
                        fillRect(13, 10, 6, 12, '#f0e0d0');
                        fillRect(16, 12, 3, 8, '#e8d0b8');
                        break;

                        break;
                    case 'ruler':

                        fillRect(7, 1, 18, 4, '#e8c030');
                        fillRect(10, 6, 12, 3, '#fef8d0');

                    case 'clock':
                        drawCirclePixels(16, 14, 12, '#fefefe');
                        drawCirclePixels(16, 14, 10, '#f8f8f8');
                        fillRect(14, 4, 4, 4, '#3d3d3d');
                        fillRect(14, 20, 4, 4, '#3d3d3d');
                        fillRect(4, 12, 4, 4, '#3d3d3d');

                        fillRect(16, 8, 3, 6, '#e8536c');
                        fillRect(15, 13, 3, 3, '#3d3d3d');
                        break;
                    case 'door':
                        fillRect(5, 4, 22, 26, '#8b5e3c');
                        fillRect(4, 3, 24, 28, '#7a4e2e');
                        fillRect(6, 2, 20, 4, '#6b3e1e');
                        fillRect(22, 14, 3, 4, '#f0b440');
                        fillRect(8, 8, 8, 14, '#a07050');
                        fillRect(8, 6, 8, 4, '#b8885c');
                        break;
                    case 'sofa':
                        fillRect(4, 10, 24, 14, '#e8a060');
                        fillRect(3, 8, 26, 5, '#d89050');

                        fillRect(3, 20, 6, 6, '#c88040');
                        fillRect(23, 20, 6, 6, '#c88040');
                        fillRect(8, 14, 16, 4, '#f0c090');
                        break;
                    case 'phone':
                        fillRect(8, 4, 16, 22, '#5dade2');
                        fillRect(7, 3, 18, 24, '#4d8ecb');
                        fillRect(10, 6, 12, 14, '#e8f4f8');
                        fillRect(12, 8, 8, 10, '#d0e8f0');

                    default:
                        fillRect(4, 4, 24, 24, c);
                        fillRect(6, 6, 20, 20, '#fefefe');
                        fillRect(10, 10, 12, 12, c);
                }
                ctx.restore();
            }

            // 绘制主角
            function drawCharacter(ctx, x, y) {
                ctx.save();
                ctx.imageSmoothingEnabled = false;
                const c = ctx;
                // 简单的像素小人（16x24）
                c.fillStyle = '#f5d5b8'; // 脸
                c.fillRect(x + 4, y + 2, 8, 8);
                c.fillStyle = '#4a3a2e'; // 头发
                c.fillRect(x + 3, y, 10, 4);
                c.fillStyle = '#2c1a0e'; // 眼睛
                c.fillRect(x + 5, y + 4, 2, 2);
                c.fillRect(x + 9, y + 4, 2, 2);
                c.fillStyle = '#e8833a'; // 衣服
                c.fillRect(x + 2, y + 10, 12, 8);
                c.fillStyle = '#3d5a80'; // 裤子
                c.fillRect(x + 4, y + 18, 4, 6);
                c.fillRect(x + 8, y + 18, 4, 6);
                c.fillStyle = '#6b4226'; // 鞋子
                c.fillRect(x + 3, y + 22, 5, 3);
                c.fillRect(x + 8, y + 22, 5, 3);
                ctx.restore();
            }

            // 绘制场景背景
            function drawBackground(ctx, scene) {
                const w = canvas.width;
                const h = canvas.height;
                // 天空
                ctx.fillStyle = scene.bgColor;
                ctx.fillRect(0, 0, w, h);
                // 地面
                ctx.fillStyle = scene.groundColor;
                ctx.fillRect(0, h * 0.7, w, h * 0.3);
                // 简易装饰：根据场景添加一些像素元素
                ctx.fillStyle = '#ffffff30';
                // 随机像素云朵（简化）
                for (let i = 0; i < 5; i++) {
                    const cx = (i * 120 + 40) % w;
                    const cy = 30 + (i % 3) * 20;
                    ctx.fillRect(cx, cy, 30, 10, '#ffffff80');
                    ctx.fillRect(cx + 10, cy - 5, 20, 8, '#ffffff80');
                }
            }

            // 绘制整个场景
            function drawScene() {
                const scene = scenes[currentSceneId];
                if (!scene) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawBackground(ctx, scene);
                // 绘制物品
                scene.words.forEach(item => {
                    drawPixelIcon(ctx, item.iconType, item.color, item.x, item.y, 40);
                    // 如果已收集，加一个绿色勾
                    if (collectedItems[currentSceneId] && collectedItems[currentSceneId].includes(item
                            .en)) {
                        ctx.fillStyle = '#5cb85c';
                        ctx.font = '12px "Press Start 2P"';
                        ctx.fillText('✔', item.x + 28, item.y + 10);
                    }
                });
                // 绘制主角（固定在右下角）
                const charX = canvas.width - 60;
                const charY = canvas.height - 60;
                drawCharacter(ctx, charX, charY);
                // 主角标识
                ctx.fillStyle = '#3d2b1f';
                ctx.font = '8px "Press Start 2P"';
                ctx.fillText('YOU', charX - 5, charY - 5);
            }

            // ==================== 交互逻辑 ====================
            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width; // canvas 物理像素与CSS像素比例
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;
                return { x, y };
            }

            function findItemAt(x, y) {
                const scene = scenes[currentSceneId];
                const itemSize = 40;
                const half = itemSize / 2;
                for (const item of scene.words) {
                    // 物品中心在 item.x, item.y，我们给它一个矩形点击区域
                    const cx = item.x + half;
                    const cy = item.y + half;
                    if (x >= item.x - 5 && x <= item.x + itemSize + 5 &&
                        y >= item.y - 5 && y <= item.y + itemSize + 5) {
                        return item;
                    }
                }
                return null;
            }

            function showBubble(item, canvasX, canvasY) {
                // 隐藏之前的计时器
                if (bubbleTimeout) clearTimeout(bubbleTimeout);

                const word = item.en;
                bubbleWord.textContent = word;
                wordBubble.style.display = 'flex';

                // 计算气泡在画布上的位置（相对于canvasWrapper）
                const rect = canvas.getBoundingClientRect();
                const wrapperRect = canvasWrapper.getBoundingClientRect();
                const scaleX = rect.width / canvas.width;
                const scaleY = rect.height / canvas.height;
                // 气泡应该出现在物品上方
                const bubbleLeft = (rect.left - wrapperRect.left) + (item.x * scaleX) - 20;
                const bubbleTop = (rect.top - wrapperRect.top) + (item.y * scaleY) - 40;

                wordBubble.style.left = Math.max(5, bubbleLeft) + 'px';
                wordBubble.style.top = Math.max(5, bubbleTop) + 'px';

                currentBubbleItem = item;

                // 自动播放发音
                speakWord(word);

                // 如果第一次点击该物品，记录并加星
                if (!collectedItems[currentSceneId]) {
                    collectedItems[currentSceneId] = [];
                }
                if (!collectedItems[currentSceneId].includes(word)) {
                    collectedItems[currentSceneId].push(word);
                    updateStarDisplay();
                }

                // 3.5秒后自动隐藏气泡
                bubbleTimeout = setTimeout(() => {
                    hideBubble();
                }, 3500);
            }

            function hideBubble() {
                wordBubble.style.display = 'none';
                currentBubbleItem = null;
                if (bubbleTimeout) clearTimeout(bubbleTimeout);
            }

            // 发音函数
            function speakWord(word) {
                if (!('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.75;
                utterance.pitch = 1.1;
                const voices = window.speechSynthesis.getVoices();
                const englishVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female')) ||
                    voices.find(v => v.lang.startsWith('en')) || voices[0];
                if (englishVoice) utterance.voice = englishVoice;
                window.speechSynthesis.speak(utterance);
            }

            // 手动点击发音按钮
            bubbleSpeaker.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentBubbleItem) {
                    speakWord(currentBubbleItem.en);
                }
            });

            // 画布点击事件
            canvas.addEventListener('click', (e) => {
                const { x, y } = getCanvasCoords(e);
                const item = findItemAt(x, y);
                if (item) {
                    showBubble(item, x, y);
                    // 物品弹跳动画简单处理：重绘（实际已经在showBubble里重绘？不会自动重绘，这里主动重绘）
                    drawScene();
                    // 触发一个小动画效果：在物品位置闪现星星（通过CSS动画在canvas上不好做，用canvas画？）
                    // 为简单，用canvas画一个小星星瞬间
                    const starX = item.x + 20;
                    const starY = item.y - 10;
                    ctx.fillStyle = '#ffc107';
                    ctx.font = '16px "Press Start 2P"';
                    ctx.fillText('⭐', starX - 10, starY);
                    setTimeout(() => drawScene(), 300);
                } else {
                    hideBubble();
                }
            });

            // 移动端触摸
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const { x, y } = getCanvasCoords(e);
                const item = findItemAt(x, y);
                if (item) {
                    showBubble(item, x, y);
                    drawScene();
                    const starX = item.x + 20;
                    const starY = item.y - 10;
                    ctx.fillStyle = '#ffc107';
                    ctx.font = '16px "Press Start 2P"';
                    ctx.fillText('⭐', starX - 10, starY);
                    setTimeout(() => drawScene(), 300);
                } else {
                    hideBubble();
                }
            });

            // 点击画布空白区域隐藏气泡
            canvasWrapper.addEventListener('click', (e) => {
                if (e.target === canvasWrapper || e.target === wordBubble || e.target === bubbleSpeaker) return;
                // 如果点击画布外，隐藏气泡
                if (e.target !== canvas) {
                    hideBubble();
                }
            });

            // ==================== 星星系统 ====================
            function updateStarDisplay() {
                const scene = scenes[currentSceneId];
                const collected = collectedItems[currentSceneId] || [];
                const total = scene.words.length;
                let starsHtml = '';
                for (let i = 0; i < total; i++) {
                    if (i < collected.length) {
                        starsHtml += '<span class="star-filled">★</span>';
                    } else {
                        starsHtml += '<span class="star-empty">☆</span>';
                    }
                }
                starIcons.innerHTML = starsHtml;
                starCountText.textContent = `${collected.length} / ${total}`;
            }

            function resetStars() {
                collectedItems[currentSceneId] = [];
                updateStarDisplay();
                drawScene();
                hideBubble();
            }

            document.getElementById('btnReset').addEventListener('click', resetStars);

            // ==================== 场景切换 ====================
            function switchScene(sceneId) {
                currentSceneId = sceneId;
                hideBubble();
                drawScene();
                updateStarDisplay();
                // 更新导航样式
                document.querySelectorAll('.scene-tab').forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.scene === sceneId) tab.classList.add('active');
                });
            }

            sceneNav.addEventListener('click', (e) => {
                const tab = e.target.closest('.scene-tab');
                if (!tab) return;
                const sceneId = tab.dataset.scene;
                if (sceneId && scenes[sceneId]) {
                    switchScene(sceneId);
                }
            });

            // ==================== 响应式处理 ====================
            function resizeCanvas() {
                // 保持内部尺寸不变，CSS会根据max-width缩放
                // 无需额外操作
            }
            window.addEventListener('resize', resizeCanvas);

            // ==================== 初始化 ====================
            function init() {
                // 预加载语音
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.getVoices();
                }
                // 初始化星星记录
                collectedItems = {};
                updateStarDisplay();
                drawScene();
            }

            init();

            console.log('🎨 场景探索版像素单词乐园已启动！');
            console.log('点击场景中的物品学习单词，点击右上角喇叭重复发音。');
        })();
    </script>
